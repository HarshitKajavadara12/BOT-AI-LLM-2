# Institutional Trading Firm Configuration Template
# High-frequency trading with advanced risk management

firm:
  name: "Institutional Capital Partners"
  id: "institutional"
  type: "hedge_fund"
  aum: 5000000000  # $5B AUM
  founded: "2018"
  
  # Regulatory Information
  regulatory:
    sec_registered: true
    cftc_registered: true
    jurisdiction: "US"
    regulatory_capital: 500000000  # $500M
    
  # Capital Structure
  capital:
    total_capital: 5000000000     # $5B
    trading_capital: 3000000000   # $3B allocated to trading
    cash_reserves: 1000000000     # $1B cash reserves
    credit_lines: 2000000000      # $2B credit facilities
    
    allocation:
      equity_long_short: 0.40     # 40%
      fixed_income: 0.20          # 20%
      commodities: 0.15           # 15%
      currencies: 0.10            # 10%
      crypto: 0.05                # 5%
      alternatives: 0.10          # 10%
      
  # Trading Parameters
  trading:
    enabled_strategies:
      - "momentum_equity"
      - "mean_reversion_fx"
      - "statistical_arbitrage"
      - "pairs_trading"
      - "volatility_surface_arb"
      - "cross_asset_momentum"
      
    max_positions: 1000
    position_sizing_method: "kelly_criterion"
    rebalancing_frequency: "intraday"
    
    execution_preferences:
      default_algorithm: "implementation_shortfall"
      dark_pools: true
      iceberg_orders: true
      order_splitting: true
      
    market_making:
      enabled: true
      instruments: ["SPY", "QQQ", "IWM", "GLD", "TLT"]
      min_spread_bps: 1
      max_inventory_size: 10000000  # $10M per instrument
      
  # Risk Management Framework
  risk_management:
    # Global Risk Limits
    global_limits:
      max_gross_exposure: 3000000000      # $3B gross
      max_net_exposure: 1500000000        # $1.5B net
      max_leverage: 3.0                   # 3:1 leverage
      max_sector_concentration: 0.15      # 15% per sector
      max_geographic_concentration: 0.60  # 60% per region
      max_currency_exposure: 0.25         # 25% per currency
      
    # Position Limits
    position_limits:
      max_single_position: 100000000      # $100M per position
      max_position_percent: 0.02          # 2% of portfolio
      max_correlation_cluster: 0.25       # 25% in correlated positions
      
    # Value at Risk (VaR)
    var_settings:
      confidence_level: 0.99
      holding_period: 1              # 1-day VaR
      lookback_period: 252           # 1 year
      monte_carlo_simulations: 100000
      max_portfolio_var: 30000000    # $30M daily VaR
      max_strategy_var: 10000000     # $10M per strategy
      
    # Stress Testing
    stress_testing:
      enabled: true
      scenarios:
        - name: "2008_financial_crisis"
          equity_shock: -0.40
          credit_spread_shock: 0.0500
          volatility_shock: 2.0
          
        - name: "covid_crash_2020"
          equity_shock: -0.35
          bond_rally: 0.20
          volatility_shock: 3.0
          
        - name: "flash_crash"
          equity_shock: -0.10
          liquidity_shock: 0.50
          correlation_shock: 0.90
          
    # Drawdown Management
    drawdown_limits:
      max_daily_drawdown: 0.015          # 1.5%
      max_weekly_drawdown: 0.040         # 4.0%
      max_monthly_drawdown: 0.080        # 8.0%
      max_annual_drawdown: 0.150         # 15%
      
      stop_loss_levels:
        warning: 0.010                   # 1% warning
        reduce_risk: 0.020               # 2% reduce positions
        halt_trading: 0.035              # 3.5% halt new trades
        
    # Liquidity Risk
    liquidity_management:
      min_liquidity_buffer: 0.15         # 15% of portfolio
      max_illiquid_allocation: 0.20      # 20% in illiquid assets
      liquidation_time_horizons:
        normal_market: 2                 # 2 days
        stressed_market: 10              # 10 days
        
  # Performance Targets
  performance:
    target_annual_return: 0.15           # 15% target return
    target_sharpe_ratio: 1.5             # 1.5 Sharpe ratio
    target_max_drawdown: 0.08            # 8% max drawdown
    target_win_rate: 0.55                # 55% win rate
    
    benchmarks:
      primary: "S&P 500"
      secondary: ["Russell 2000", "MSCI World", "Barclays Agg"]
      
  # Technology Infrastructure
  technology:
    # Execution Systems
    execution:
      primary_broker: "Goldman Sachs"
      backup_brokers: ["Morgan Stanley", "JPMorgan"]
      direct_market_access: true
      co_location: ["NYSE", "NASDAQ", "CME"]
      
    # Data Feeds
    data_providers:
      real_time: ["Bloomberg", "Refinitiv", "Interactive Brokers"]
      historical: ["QuantConnect", "Quandl", "Alpha Architect"]
      alternative: ["Satellite imagery", "Social sentiment", "Patent filings"]
      
    # Computing Infrastructure
    infrastructure:
      cloud_provider: "AWS"
      regions: ["us-east-1", "us-west-2", "eu-west-1"]
      disaster_recovery: true
      backup_frequency: "hourly"
      
  # Compliance & Reporting
  compliance:
    # Regulatory Reporting
    reporting:
      form_pf: true              # SEC Form PF
      cftc_reporting: true       # CFTC Large Trader Reporting
      emir_reporting: true       # European regulation
      mifid_compliance: true     # MiFID II compliance
      
    # Risk Reporting
    risk_reports:
      daily_var_report: true
      weekly_stress_test: true
      monthly_attribution: true
      quarterly_review: true
      
    # Audit Trail
    audit:
      trade_reconstruction: true
      order_audit: true
      position_reconciliation: "daily"
      exception_reporting: true
      
  # Fee Structure
  fees:
    management_fee: 0.02          # 2% management fee
    performance_fee: 0.20         # 20% performance fee
    high_water_mark: true
    hurdle_rate: 0.06            # 6% hurdle rate
    
    transaction_costs:
      equity_commission: 0.0005   # 5 bps
      fx_spread: 0.0002          # 2 bps
      futures_commission: 2.50    # $2.50 per contract
      
  # Team Structure
  team:
    portfolio_managers: 5
    quantitative_researchers: 8
    risk_managers: 3
    traders: 6
    technology: 12
    operations: 4
    compliance: 2
    
  # Strategy Allocation
  strategies:
    momentum_equity:
      allocation: 0.25           # 25% of trading capital
      target_return: 0.18
      target_volatility: 0.12
      max_drawdown: 0.08
      
    mean_reversion_fx:
      allocation: 0.20           # 20% of trading capital
      target_return: 0.12
      target_volatility: 0.08
      max_drawdown: 0.05
      
    statistical_arbitrage:
      allocation: 0.20           # 20% of trading capital
      target_return: 0.15
      target_volatility: 0.06
      max_drawdown: 0.04
      
    pairs_trading:
      allocation: 0.15           # 15% of trading capital
      target_return: 0.12
      target_volatility: 0.05
      max_drawdown: 0.03
      
    volatility_surface_arb:
      allocation: 0.15           # 15% of trading capital
      target_return: 0.20
      target_volatility: 0.15
      max_drawdown: 0.10
      
    cross_asset_momentum:
      allocation: 0.05           # 5% of trading capital
      target_return: 0.25
      target_volatility: 0.20
      max_drawdown: 0.12
      
  # Market Access
  market_access:
    exchanges:
      - "NYSE"
      - "NASDAQ"
      - "CME"
      - "CBOT"
      - "ICE"
      - "LSE"
      - "Eurex"
      - "Tokyo Stock Exchange"
      
    asset_classes:
      - "equities"
      - "fixed_income"
      - "currencies"
      - "commodities"
      - "derivatives"
      - "crypto" # Limited allocation
      
  # Emergency Procedures
  emergency:
    circuit_breakers:
      portfolio_loss_5pct: "reduce_positions_50pct"
      portfolio_loss_10pct: "liquidate_all_positions"
      market_volatility_spike: "hedge_portfolio"
      
    contact_protocols:
      primary_contact: "cro@institutionalcap.com"
      escalation_contact: "ceo@institutionalcap.com"
      regulatory_contact: "compliance@institutionalcap.com"
      
    business_continuity:
      backup_location: "Chicago Office"
      remote_trading: true
      data_backup_sites: 3