name: Architecture Guard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  enforce-boundaries:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install test dependencies if any
        pip install pytest
        
    - name: Run Authority Boundary Tests
      run: |
        # Run the specific authority test file
        # We use unittest as it is standard library
        python -m unittest tests.test_llm_authority
        
    - name: Fail if Forbidden Imports Found (Grep Check)
      run: |
        # Double check with grep for any direct imports in execution folder
        # This is a backup to the AST test
        if grep -r "import llm_integration" core/execution_algorithms/ execution/ risk_management/; then
          echo "  CRITICAL: Forbidden import found via grep!"
          exit 1
        fi
        if grep -r "from llm_integration" core/execution_algorithms/ execution/ risk_management/; then
          echo "  CRITICAL: Forbidden import found via grep!"
          exit 1
        fi
        echo "  No forbidden imports found via grep."
